<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Engineer Roadmap — 30‑Week Day‑by‑Day (7‑Day Balanced, Colorful Tags)</title>
    <style>
        :root {

            --tag-nnfs-bg: #FAECE7; --tag-nnfs-text: #712B13;
            --tag-llmbook-bg: #FAEEDA; --tag-llmbook-text: #633806;

            --input-border: #444468; --phase-body-bg: #1e1e3a;

            --tag-mfml-bg: #232252; --tag-mfml-text: #9d97f0;
            --tag-nnfs-bg: #2a1a1a; --tag-nnfs-text: #e09b8c;
            --tag-llmbook-bg: #2a2416; --tag-llmbook-text: #e0c27c;
            --tag-deepml-bg: #1a2a16; --tag-deepml-text: #8bc47c;
            --tag-torchleet-bg: #2a1a24; --tag-torchleet-text: #e09bb0;
            --tag-roadmap-bg: #162a26; --tag-roadmap-text: #7cc4b8;
            --tag-paper-bg: #2a1616; --tag-paper-text: #e09b9b;

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg); color: var(--text-primary); padding: 1.5rem;
            line-height: 1.5; transition: background 0.3s, color 0.3s; min-height: 100vh;
        }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
        .roadmap { max-width: 760px; margin: 0 auto; }
        .tab-nav { display: flex; gap: 4px; margin-bottom: 1.5rem; background: var(--card-bg); padding: 5px; border-radius: 28px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 0.65rem 1rem; border-radius: 24px; border: none; background: transparent; font-size: 0.9rem; font-weight: 500; cursor: pointer; color: var(--tab-text); transition: all 0.2s; font-family: inherit; white-space: nowrap; }

        .tab-btn:hover:not(.active) { color: var(--text-primary); background: var(--hover-bg); }

        .toolbar .btn-danger:hover { background: #fff0f0; color: #b91c1c; }
        body.dark .toolbar .btn-danger:hover { background: #3d1a1a; color: #f87171; }

        .dash-ring-wrap { flex-shrink: 0; position: relative; width: 110px; height: 110px; }
        .dash-ring-wrap svg { width: 110px; height: 110px; transform: rotate(-90deg); }
        .dash-ring-bg { fill: none; stroke: var(--ring-bg); stroke-width: 10; }
        .dash-ring-fill { fill: none; stroke: var(--progress-fill); stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 0.8s cubic-bezier(0.23,1,0.32,1); }
        .dash-ring-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; pointer-events: none; }
        .dash-ring-pct { font-size: 1.6rem; font-weight: 700; color: var(--text-primary); line-height: 1; }
        .dash-ring-label { font-size: 0.7rem; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; }
        .dash-stats { flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 0.6rem; }
        .dash-stat-row { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; color: var(--text-secondary); }
        .dash-stat-row .stat-icon { font-size: 1.1rem; flex-shrink: 0; }
        .dash-stat-row strong { color: var(--text-primary); font-weight: 600; }
        .dash-motivation { font-size: 0.85rem; color: var(--progress-fill); font-weight: 500; margin-top: 2px; }
        .quick-jump { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem; }

        .quick-jump .chip:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--text-tertiary); }
        .quick-jump .chip.active-chip { border-color: var(--progress-fill); color: var(--progress-fill); background: #e6f7f0; }

        .progress-bar-wrap { background: var(--card-bg); border-radius: 16px; padding: 1.25rem 1.5rem; margin-bottom: 1rem; box-shadow: var(--shadow-sm); border: 1px solid var(--border); transition: background 0.3s, border 0.3s; }
        .progress-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .progress-label { font-size: 0.9rem; font-weight: 600; color: var(--text-primary); }
        .progress-count { font-size: 0.8rem; font-weight: 500; color: var(--text-secondary); background: var(--badge-bg); padding: 0.2rem 0.75rem; border-radius: 20px; }
        .progress-track { height: 8px; background: var(--progress-track); border-radius: 8px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--progress-fill), var(--progress-fill-glow)); border-radius: 8px; transition: width 0.6s cubic-bezier(0.23,1,0.32,1); }
        .search-wrap { margin-bottom: 1rem; position: relative; }
        .search-wrap input { width: 100%; padding: 0.7rem 1rem 0.7rem 2.5rem; border-radius: 25px; border: 1.5px solid var(--input-border); background: var(--input-bg); font-size: 0.9rem; color: var(--text-primary); transition: all 0.2s; font-family: inherit; outline: none; }
        .search-wrap input:focus { border-color: var(--focus-ring); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
        .search-wrap .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-tertiary); pointer-events: none; font-size: 1rem; }
        .search-clear { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-tertiary); cursor: pointer; font-size: 1.1rem; display: none; padding: 4px; border-radius: 50%; line-height: 1; }
        .search-clear.visible { display: block; }
        .search-clear:hover { color: var(--text-primary); background: var(--hover-bg); }
        .resources-container { background: var(--card-bg); border-radius: 20px; padding: 1.5rem 1.75rem; box-shadow: var(--shadow-md); border: 1px solid var(--border); }
        .resource-group { margin-bottom: 1.5rem; }

        .resource-list { list-style: none; padding-left: 0; }

        .resource-desc { color: var(--text-tertiary); font-size: 0.8rem; margin-left: 4px; }
        .paper-item { font-style: italic; color: var(--text-secondary); }
        .phase-header { display: flex; align-items: center; gap: 14px; padding: 1rem 1.5rem; margin-bottom: 4px; border-radius: 16px; background: var(--card-bg); box-shadow: var(--shadow-sm); border: 1px solid var(--border); cursor: pointer; user-select: none; transition: all 0.2s; position: relative; }
        .phase-header:hover { background: var(--hover-phase); box-shadow: var(--shadow-md); }
        .phase-icon { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; flex-shrink: 0; }
        .phase-title { flex: 1; min-width: 0; }
        .phase-title h2 { font-size: 1.05rem; font-weight: 600; color: var(--text-primary); margin: 0; }
        .phase-title p { font-size: 0.82rem; color: var(--text-secondary); margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .phase-progress { font-size: 0.78rem; font-weight: 600; color: var(--text-secondary); background: var(--badge-bg); padding: 0.2rem 0.75rem; border-radius: 20px; white-space: nowrap; }
        .phase-toggle { font-size: 1rem; color: var(--text-tertiary); transition: transform 0.3s; display: flex; align-items: center; flex-shrink: 0; }
        .phase-toggle.open { transform: rotate(180deg); }
        .phase-check-all { font-size: 0.7rem; padding: 0.25rem 0.6rem; border-radius: 14px; border: 1px solid var(--border); background: transparent; color: var(--text-tertiary); cursor: pointer; transition: all 0.2s; white-space: nowrap; font-family: inherit; flex-shrink: 0; }
        .phase-check-all:hover { background: #e6f7f0; color: var(--progress-fill); border-color: var(--progress-fill); }
        body.dark .phase-check-all:hover { background: #1a3028; }
        .phase-body { max-height: 0; overflow: hidden; opacity: 0; transition: max-height 0.5s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease; }
        .phase-body.open { max-height: 9999px; opacity: 1; }
        .week-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; margin: 10px 0; overflow: hidden; box-shadow: var(--shadow-sm); transition: box-shadow 0.2s, border-color 0.2s, opacity 0.3s; }
        .week-card:hover { box-shadow: var(--shadow-lg); }
        .week-card.focused { border-color: var(--focus-ring) !important; box-shadow: 0 0 0 3px rgba(59,130,246,0.2) !important; }
        .week-card.filtered-out { display: none; }
        .week-header { display: flex; align-items: center; gap: 12px; padding: 12px 18px; cursor: pointer; background: var(--card-bg); transition: background 0.2s; flex-wrap: wrap; }
        .week-header:hover { background: var(--hover-bg); }
        .week-num { font-size: 0.78rem; font-weight: 600; color: var(--text-tertiary); min-width: 58px; text-transform: uppercase; letter-spacing: 0.04em; }
        .week-title { font-size: 0.93rem; font-weight: 500; color: var(--text-primary); flex: 1; }
        .week-day-progress { font-size: 0.7rem; background: var(--badge-bg); color: var(--text-secondary); padding: 0.15rem 0.5rem; border-radius: 12px; white-space: nowrap; margin-right: 6px; }
        .week-check { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--week-check-border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; cursor: pointer; position: relative; }
        .week-check:hover { border-color: var(--progress-fill); background: var(--week-check-hover-bg); }
        .week-check.done { background: var(--progress-fill); border-color: var(--progress-fill); }
        .week-check.done::after { content: ''; width: 5px; height: 9px; border: 2px solid white; border-top: none; border-left: none; transform: rotate(45deg) translateY(-1px); position: absolute; top: 3px; }
        .week-note-btn { background: none; border: none; cursor: pointer; font-size: 1rem; color: var(--text-tertiary); padding: 4px; border-radius: 6px; transition: all 0.2s; flex-shrink: 0; line-height: 1; }
        .week-note-btn:hover { color: var(--text-primary); background: var(--hover-bg); }

        .week-note-input:focus { border-color: var(--focus-ring); box-shadow: 0 0 0 3px rgba(59,130,246,0.08); }
        .week-note-input::placeholder { color: var(--text-tertiary); font-style: italic; }
        .day-list { display: flex; flex-direction: column; gap: 8px; }
        .day-item { background: var(--day-bg); border: 1px solid var(--day-border); border-radius: 10px; padding: 10px 14px; display: flex; align-items: flex-start; gap: 10px; transition: background 0.2s; }
        .day-item:hover { background: var(--hover-bg); }
        .day-checkbox { width: 18px; height: 18px; border-radius: 4px; border: 2px solid var(--week-check-border); flex-shrink: 0; margin-top: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .day-checkbox.done { background: var(--day-check-done); border-color: var(--day-check-done); }
        .day-checkbox.done::after { content: ''; width: 4px; height: 8px; border: 2px solid white; border-top: none; border-left: none; transform: rotate(45deg) translateY(-1px); }
        .day-label { font-weight: 600; font-size: 0.82rem; color: var(--text-primary); min-width: 60px; }
        .day-tasks { color: var(--text-secondary); font-size: 0.84rem; line-height: 1.6; }
        .day-tasks ul { list-style: none; padding: 0; margin: 0; }
        .day-tasks li { margin-bottom: 2px; }
        .day-tasks li::before { content: '•'; color: var(--text-tertiary); margin-right: 6px; }
        .resource-tag {
            display: inline-block; font-size: 0.7rem; font-weight: 600;
            padding: 0.1rem 0.45rem; border-radius: 10px; margin-left: 4px;
            vertical-align: middle; letter-spacing: 0.02em; line-height: 1.4;
        }
        .tag-strang { background: var(--tag-strang-bg); color: var(--tag-strang-text); }
        .tag-mfml { background: var(--tag-mfml-bg); color: var(--tag-mfml-text); }
        .tag-nnfs { background: var(--tag-nnfs-bg); color: var(--tag-nnfs-text); }
        .tag-llmbook { background: var(--tag-llmbook-bg); color: var(--tag-llmbook-text); }
        .tag-deepml { background: var(--tag-deepml-bg); color: var(--tag-deepml-text); }
        .tag-torchleet { background: var(--tag-torchleet-bg); color: var(--tag-torchleet-text); }
        .tag-roadmap { background: var(--tag-roadmap-bg); color: var(--tag-roadmap-text); }
        .tag-paper { background: var(--tag-paper-bg); color: var(--tag-paper-text); }
        .tag-project { background: var(--tag-project-bg); color: var(--tag-project-text); }
        .tag-review { background: var(--tag-review-bg); color: var(--tag-review-text); }
        .tag-setup { background: var(--tag-setup-bg); color: var(--tag-setup-text); }
        .tag-study { background: var(--tag-study-bg); color: var(--tag-study-text); }
        .milestone { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 12px; background: var(--milestone-bg); border: 1px solid var(--milestone-border); margin-top: 12px; font-size: 0.88rem; color: var(--milestone-text); font-weight: 500; }

        .confetti-particle { position: absolute; font-size: 1.2rem; animation: confetti-fall 1.4s ease-out forwards; pointer-events: none; }
        @keyframes confetti-fall { 0% { opacity: 1; transform: translate(0,0) rotate(0deg) scale(1); } 100% { opacity: 0; transform: translate(var(--dx),var(--dy)) rotate(var(--rot)) scale(0.3); } }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1a1a2e; color: #fff; padding: 0.7rem 1.4rem; border-radius: 25px; font-size: 0.85rem; font-weight: 500; z-index: 10000; pointer-events: none; transition: transform 0.35s cubic-bezier(0.23,1,0.32,1); box-shadow: 0 8px 24px rgba(0,0,0,0.3); white-space: nowrap; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        @media (max-width: 600px) {
            body { padding: 0.75rem; }
            .dashboard { flex-direction: column; align-items: center; text-align: center; padding: 1.25rem; gap: 1rem; }
            .dash-stats { align-items: center; }
            .dash-stat-row { justify-content: center; }
            .phase-header { padding: 0.85rem 1rem; gap: 8px; flex-wrap: wrap; }
            .phase-check-all { font-size: 0.65rem; padding: 0.2rem 0.5rem; }

            .week-title { font-size: 0.82rem; }
            .toolbar { justify-content: center; }
            .quick-jump { justify-content: center; }
            .quick-jump .chip { font-size: 0.7rem; padding: 0.3rem 0.7rem; }
            .tab-nav { flex-direction: column; border-radius: 20px; }
            .tab-btn { width: 100%; border-radius: 16px; }

        // ── State ──
        let completedWeeks = new Set(JSON.parse(localStorage.getItem('aiml_done') || '[]'));
        let completedDays = new Set(JSON.parse(localStorage.getItem('aiml_days_done') || '[]'));
        let notes = JSON.parse(localStorage.getItem('aiml_notes') || '{}');
        let currentFilter = '';
        let focusedWeekNum = null;
        const TOTAL_WEEKS = 30;
        const CIRCUMFERENCE = 2 * Math.PI * 52;

        function saveWeeks() { localStorage.setItem('aiml_done', JSON.stringify([...completedWeeks])); }
        function saveDays() { localStorage.setItem('aiml_days_done', JSON.stringify([...completedDays])); }
        function saveNotes() { localStorage.setItem('aiml_notes', JSON.stringify(notes)); }
        function getDayId(weekNum, dayIdx) { return `${weekNum}-${dayIdx}`; }

        // Format task text with colourful tags
        function formatTask(taskText) {
            return taskText.replace(/\(([^)]+)\)/g, (match, tag) => {
                const tagLower = tag.toLowerCase();
                let cls = '';
                if (tagLower === 'strang') cls = 'resource-tag tag-strang';
                else if (tagLower === 'mfml') cls = 'resource-tag tag-mfml';
                else if (tagLower === 'nnfs') cls = 'resource-tag tag-nnfs';
                else if (tagLower === 'llm book') cls = 'resource-tag tag-llmbook';
                else if (tagLower === 'deep-ml') cls = 'resource-tag tag-deepml';
                else if (tagLower === 'torchleet') cls = 'resource-tag tag-torchleet';
                else if (tagLower === 'roadmap') cls = 'resource-tag tag-roadmap';
                else if (tagLower === 'paper') cls = 'resource-tag tag-paper';
                else if (tagLower === 'project') cls = 'resource-tag tag-project';
                else if (tagLower === 'review') cls = 'resource-tag tag-review';
                else if (tagLower === 'setup') cls = 'resource-tag tag-setup';
                else if (tagLower === 'study') cls = 'resource-tag tag-study';
                else cls = 'resource-tag';
                return `<span class="${cls}">${tag}</span>`;
            });
        }

        // ── Tabs ──
        function switchTab(tab) {
            document.getElementById('roadmap-view').style.display = tab === 'roadmap' ? 'block' : 'none';
            document.getElementById('resources-view').style.display = tab === 'resources' ? 'block' : 'none';
            document.getElementById('tab-roadmap').classList.toggle('active', tab === 'roadmap');
            document.getElementById('tab-resources').classList.toggle('active', tab === 'resources');
            if (tab === 'resources') generateResources();
        }

        function generateResources() {
            const container = document.getElementById('resources-content');
            const resourceMap = new Map();
            const allPapers = [];
            phases.forEach(p => p.weeks_data.forEach(w => w.days.forEach(d => d.tasks.forEach(task => {
                const known = ['Gilbert Strang','Math for ML','NNFS','LLM Book','Deep-ML','TorchLeet','AI Engineer Roadmap','Papers'];
                for (const k of known) if (task.includes(k)) {
                    if (!resourceMap.has(k)) resourceMap.set(k, []);
                    resourceMap.get(k).push(task);
                    if (k==='Papers') allPapers.push(task);
                }
            }))));
            let html = '<h2 style="margin-bottom:1rem;">📚 All Learning Resources</h2>';
            html += '<div class="resource-group"><h3>📖 Primary Resources</h3><ul class="resource-list">';
            for (const [label, items] of resourceMap.entries()) {
                const desc = { 'Gilbert Strang':'MIT 18.06 Linear Algebra lectures','Math for ML':'Mathematics for Machine Learning (Deisenroth et al.)','NNFS':'Neural Networks from Scratch','LLM Book':'Build a Large Language Model (From Scratch) by Raschka','Deep-ML':'Deep-ML.com – ML coding challenges','TorchLeet':'TorchLeet – PyTorch practice problems','AI Engineer Roadmap':'roadmap.sh/ai-engineer' }[label] || '';
                html += `<li><span class="resource-bullet"></span><strong>${label}</strong> <span class="resource-desc">— ${desc}</span></li>`;
            }
            html += '</ul></div>';
            if (allPapers.length) {
                html += '<div class="resource-group"><h3>📄 Research Papers</h3><ul class="resource-list">';
                [...new Set(allPapers)].forEach(p => html += `<li class="paper-item"><span class="resource-bullet" style="background:#F0A92D;"></span>${p}</li>`);
                html += '</ul></div>';
            }
            container.innerHTML = html;
        }

        // ── Theme ──
        function applyTheme() {
            const saved = localStorage.getItem('aiml_theme');
            if (saved === 'dark') {
                document.body.classList.add('dark');
                document.getElementById('theme-toggle').textContent = '☀️';
            } else {
                document.body.classList.remove('dark');
                document.getElementById('theme-toggle').textContent = '🌙';
            }
        }
        function toggleTheme() {
            if (document.body.classList.contains('dark')) {
                document.body.classList.remove('dark');
                localStorage.setItem('aiml_theme', 'light');
                document.getElementById('theme-toggle').textContent = '🌙';
            } else {
                document.body.classList.add('dark');
                localStorage.setItem('aiml_theme', 'dark');
                document.getElementById('theme-toggle').textContent = '☀️';
            }
        }
        applyTheme();

        let toastTimer;
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
        }
        function spawnConfetti(x, y) {
            const container = document.getElementById('confetti-container');
            const emojis = ['✨','🎉','⭐','💫','🌟','🎯','🔥','💎'];
            const fragment = document.createDocumentFragment();
            for (let i=0; i<28; i++) {
                const p = document.createElement('span');
                p.className = 'confetti-particle';
                p.textContent = emojis[Math.floor(Math.random()*emojis.length)];
                p.style.left = x+'px'; p.style.top = y+'px';
                p.style.setProperty('--dx', (Math.random()*180-90)+'px');
                p.style.setProperty('--dy', -(Math.random()*160+60)+'px');
                p.style.setProperty('--rot', (Math.random()*540-270)+'deg');
                fragment.appendChild(p);
            }
            container.appendChild(fragment);
            setTimeout(() => { while(container.firstChild) container.removeChild(container.firstChild); }, 1800);
        }

        function toggleDay(e, weekNum, dayIdx) {
            e.stopPropagation();
            const id = getDayId(weekNum, dayIdx);
            if (completedDays.has(id)) completedDays.delete(id);
            else completedDays.add(id);
            saveDays(); renderAll();
        }
        function toggleWeekCheck(e, weekNum) {
            e.stopPropagation();
            if (completedWeeks.has(weekNum)) completedWeeks.delete(weekNum);
            else {
                completedWeeks.add(weekNum);
                if (!localStorage.getItem('aiml_start_date')) localStorage.setItem('aiml_start_date', new Date().toISOString().split('T')[0]);
                const rect = e.target.getBoundingClientRect();
                spawnConfetti(rect.left+rect.width/2, rect.top+rect.height/2);
                showToast('✅ Week '+weekNum+' completed!');
            }
            saveWeeks(); renderAll();
        }
        function toggleWeekBody(weekNum) {
            const body = document.getElementById('wb-'+weekNum);
            if (body) body.classList.toggle('open');
        }
        function togglePhase(phaseId) {
            const body = document.getElementById('pb-'+phaseId);
            const icon = document.getElementById('pi-'+phaseId);
            if (body) body.classList.toggle('open');
            if (icon) icon.classList.toggle('open');
            if (focusedWeekNum) setTimeout(() => focusWeekCard(focusedWeekNum), 500);
        }
        function markPhaseAll(phaseId, e) {
            e.stopPropagation();
            const phase = phases.find(p=>p.id===phaseId);
            if (!phase) return;
            const allNums = phase.weeks_data.map(w=>w.num);
            const allDone = allNums.every(n=>completedWeeks.has(n));
            if (allDone) {
                allNums.forEach(n=>completedWeeks.delete(n));
                showToast('↩️ '+phase.label+' unmarked');
            } else {
                allNums.forEach(n=>completedWeeks.add(n));
                if (!localStorage.getItem('aiml_start_date')) localStorage.setItem('aiml_start_date', new Date().toISOString().split('T')[0]);
                showToast('✅ '+phase.label+' fully completed!');
                const rect = e.target.getBoundingClientRect();
                spawnConfetti(rect.left+rect.width/2, rect.top+rect.height/2);
            }
            saveWeeks(); renderAll();
        }
        function handleNoteInput(weekNum, value) {
            if (value.trim()) notes[weekNum] = value.trim();
            else delete notes[weekNum];
            saveNotes();
            const btn = document.querySelector('.week-note-btn[data-week="'+weekNum+'"]');
            if (btn) btn.classList.toggle('has-note', !!notes[weekNum]);
        }

        function onSearch(value) {
            currentFilter = value.trim().toLowerCase();
            document.getElementById('search-clear').classList.toggle('visible', !!currentFilter);
            renderAll();
        }
        function clearSearch() {
            document.getElementById('search-input').value = '';
            currentFilter = '';
            document.getElementById('search-clear').classList.remove('visible');
            renderAll();
            document.getElementById('search-input').focus();
        }
        function matchesFilter(weekData, phaseData) {
            if (!currentFilter) return true;
            const text = [
                phaseData.title, phaseData.goal, phaseData.label,
                weekData.title, 'week '+weekData.num,
                ...weekData.days.flatMap(d=>[d.label, ...d.tasks]),
                weekData.milestone||'', weekData.note||'', notes[weekData.num]||''
            ].join(' ').toLowerCase();
            return text.includes(currentFilter);
        }

        function renderAll() {
            const container = document.getElementById('phases');
            container.innerHTML = '';
            const qj = document.getElementById('quick-jump');
            qj.innerHTML = phases.map(p=>{
                const doneW = p.weeks_data.filter(w=>completedWeeks.has(w.num)).length;
                return `<span class="chip" data-phase-id="${p.id}" onclick="scrollToPhase('${p.id}')" style="background:${p.color}20;color:${p.textColor};border-color:${p.color}">${p.label} (${doneW}/${p.weeks_data.length})</span>`;
            }).join('');

            phases.forEach(phase => {
                let anyWeekMatches = false;
                let weeksHtml = '';
                phase.weeks_data.forEach(w => {
                    const weekMatches = matchesFilter(w, phase);
                    if (weekMatches) anyWeekMatches = true;
                    if (!weekMatches && currentFilter) return;

                    const totalDays = w.days.length;
                    const doneDays = w.days.filter((_,i)=>completedDays.has(getDayId(w.num,i))).length;
                    let daysHtml = '';
                    w.days.forEach((d, i) => {
                        const dayId = getDayId(w.num, i);
                        const isDayDone = completedDays.has(dayId);
                        daysHtml += `
                        <div class="day-item">
                            <div class="day-checkbox ${isDayDone?'done':''}" onclick="toggleDay(event,${w.num},${i})" title="${isDayDone?'Mark incomplete':'Mark complete'}"></div>
                            <div class="day-label">${d.label}</div>
                            <div class="day-tasks"><ul>${d.tasks.map(t=>`<li>${formatTask(t)}</li>`).join('')}</ul></div>
                        </div>`;
                    });

                    let bodyContent = `
                    <textarea class="week-note-input" placeholder="📝 Personal notes for Week ${w.num}…" 
                        oninput="handleNoteInput(${w.num}, this.value)" 
                        onblur="handleNoteInput(${w.num}, this.value)">${notes[w.num] || ''}</textarea>
                    <div class="day-list">${daysHtml}</div>`;
                    if (w.note) bodyContent += `<div class="note-box"><span class="note-icon">💡</span><span>${w.note}</span></div>`;
                    if (w.milestone) bodyContent += `<div class="milestone"><span>🏆</span><span>${w.milestone}</span></div>`;

                    const weekDone = completedWeeks.has(w.num);
                    weeksHtml += `
                    <div class="week-card" style="${weekDone?'opacity:0.65':''}" data-week-num="${w.num}">
                        <div class="week-header" onclick="toggleWeekBody(${w.num})">
                            <span class="week-num">Week ${w.num}</span>
                            <span class="week-title">${w.title}</span>
                            <span class="week-day-progress">${doneDays}/${totalDays} days</span>
                            <button class="week-note-btn ${notes[w.num]?'has-note':''}" data-week="${w.num}" 
                                onclick="event.stopPropagation(); toggleWeekBody(${w.num}); setTimeout(()=>document.getElementById('note-${w.num}').focus(),400)">📝</button>
                            <div class="week-check ${weekDone?'done':''}" onclick="toggleWeekCheck(event,${w.num})"
                                title="${weekDone?'Mark incomplete':'Mark complete'}" role="checkbox" aria-checked="${weekDone}"
                                aria-label="Week ${w.num} complete"></div>
                        </div>
                        <div class="week-body" id="wb-${w.num}">${bodyContent}</div>
                    </div>`;
                });

                if (currentFilter && !anyWeekMatches) return;

                const totalWeeks = phase.weeks_data.length;
                const doneWeeks = phase.weeks_data.filter(w=>completedWeeks.has(w.num)).length;
                const phaseOpen = currentFilter ? anyWeekMatches : true;
                const div = document.createElement('div');
                div.style.marginBottom = '1.5rem';
                div.id = 'phase-'+phase.id;
                div.innerHTML = `
                <div class="phase-header" onclick="togglePhase('${phase.id}')">
                    <div class="phase-icon" style="background:${phase.color};color:${phase.textColor}">${phase.label}</div>
                    <div class="phase-title"><h2>${phase.title}</h2><p>${phase.weeks} · ${phase.goal}</p></div>
                    <button class="phase-check-all" onclick="markPhaseAll('${phase.id}',event)">
                        ${doneWeeks===totalWeeks?'↩️ All':'✓ All'}
                    </button>
                    <span class="phase-progress">${doneWeeks}/${totalWeeks}</span>
                    <i class="ti ti-chevron-down phase-toggle ${phaseOpen?'open':''}" id="pi-${phase.id}">▼</i>
                </div>
                <div class="phase-body ${phaseOpen?'open':''}" id="pb-${phase.id}">${weeksHtml || (currentFilter?'<div style="padding:1rem;color:var(--text-tertiary);text-align:center">No matching weeks</div>':'')}</div>`;
                container.appendChild(div);
            });

            if (focusedWeekNum) setTimeout(()=>focusWeekCard(focusedWeekNum),100);
            updateProgress();
        }

        function focusWeekCard(weekNum) {
            document.querySelectorAll('.week-card.focused').forEach(el=>el.classList.remove('focused'));
            const card = document.querySelector(`.week-card[data-week-num="${weekNum}"]`);
            if (card) {
                card.classList.add('focused');
                card.scrollIntoView({behavior:'smooth',block:'center'});
                const phaseBody = card.closest('.phase-body');
                if (phaseBody && !phaseBody.classList.contains('open')) {
                    phaseBody.classList.add('open');
                    const phaseId = phaseBody.id.replace('pb-','');
                    const icon = document.getElementById('pi-'+phaseId);
                    if (icon) icon.classList.add('open');
                }
                const weekBody = card.querySelector('.week-body');
                if (weekBody && !weekBody.classList.contains('open')) weekBody.classList.add('open');
                focusedWeekNum = weekNum;
            }
        }
        function scrollToPhase(phaseId) {
            const el = document.getElementById('phase-'+phaseId);
            if (el) {
                el.scrollIntoView({behavior:'smooth',block:'start'});
                const body = document.getElementById('pb-'+phaseId);
                const icon = document.getElementById('pi-'+phaseId);
                if (body && !body.classList.contains('open')) { body.classList.add('open'); if (icon) icon.classList.add('open'); }
                const header = el.querySelector('.phase-header');
                if (header) { header.style.boxShadow = '0 0 0 4px rgba(59,130,246,0.35)'; setTimeout(()=>header.style.boxShadow='',1200); }
            }
        }

        function updateProgress() {
            const done = completedWeeks.size;
            document.getElementById('global-count').textContent = done + ' / ' + TOTAL_WEEKS + ' weeks';
            document.getElementById('global-bar').style.width = (done/TOTAL_WEEKS*100) + '%';
            const pct = Math.round((done/TOTAL_WEEKS)*100);
            document.getElementById('dash-ring-fill').style.strokeDashoffset = CIRCUMFERENCE - (pct/100)*CIRCUMFERENCE;
            document.getElementById('dash-pct').textContent = pct+'%';

            let curPhase='Phase 1', curWeek=1, nextMilestone=null, found=false;
            for (const p of phases) for (const w of p.weeks_data) {
                if (!completedWeeks.has(w.num) && !found) { curPhase=p.label; curWeek=w.num; found=true; }
                if (!completedWeeks.has(w.num) && w.milestone && !nextMilestone) nextMilestone='Week '+w.num+' — '+w.milestone.substring(0,50)+'…';
            }
            if (!nextMilestone) nextMilestone='All milestones completed! 🎉';
            if (done>=TOTAL_WEEKS) { curPhase='Phase 6'; curWeek=30; }
            document.getElementById('dash-current').textContent = curPhase+' · Week '+curWeek;
            document.getElementById('dash-milestone').textContent = nextMilestone;
            document.getElementById('dash-remaining').textContent = (TOTAL_WEEKS-done)+' weeks';

            const pctDone = Math.round((done/TOTAL_WEEKS)*100);
            const msgs = ['Ready to begin the journey! 🚀','Great start! 💪','Solid progress! 🔥','Halfway there! ⚡','Deep work zone! 🎯','Almost there! 🏆','One week left! 🌟','All 30 weeks complete! 🎉👑'];
            const idx = pctDone===0?0:pctDone<15?1:pctDone<35?2:pctDone<55?3:pctDone<75?4:pctDone<95?5:pctDone<100?6:7;
            document.getElementById('dash-motivation').textContent = msgs[idx];

            document.querySelectorAll('.quick-jump .chip').forEach(chip=>{
                chip.classList.toggle('active-chip', chip.dataset.phaseId === (found ? phases.find(p=>p.label===curPhase)?.id : 'p6'));
            });
        }

        document.addEventListener('keydown', function(e) {
            if (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
            if (e.ctrlKey||e.metaKey||e.altKey) return;
            const visibleCards = Array.from(document.querySelectorAll('.week-card:not(.filtered-out)')).filter(card=>card.closest('.phase-body')?.classList.contains('open'));
            if (!visibleCards.length) return;
            let idx = visibleCards.findIndex(c=>c.classList.contains('focused')); if (idx===-1) idx=0;
            if (e.key==='ArrowDown'||e.key==='ArrowUp') {
                e.preventDefault();
                idx = e.key==='ArrowDown' ? Math.min(idx+1,visibleCards.length-1) : Math.max(idx-1,0);
                const weekNum = parseInt(visibleCards[idx].dataset.weekNum);
                focusedWeekNum = weekNum; focusWeekCard(weekNum);
            }
            if (e.key===' ' && focusedWeekNum!==null) {
                e.preventDefault();
                const card = document.querySelector(`.week-card[data-week-num="${focusedWeekNum}"]`);
                if (card) { const check = card.querySelector('.week-check'); if (check) toggleWeekCheck({stopPropagation:()=>{}, target:check}, focusedWeekNum); }
            }
        });
        document.addEventListener('click', function(e) {
            const card = e.target.closest('.week-card');
            if (card && card.dataset.weekNum) {
                focusedWeekNum = parseInt(card.dataset.weekNum);
                document.querySelectorAll('.week-card.focused').forEach(el=>el.classList.remove('focused'));
                card.classList.add('focused');
            }
        });

        function exportData() {
            const data = {
                completedWeeks: [...completedWeeks], completedDays: [...completedDays], notes,
                startDate: localStorage.getItem('aiml_start_date')||null,
                theme: localStorage.getItem('aiml_theme')||'light', exportedAt: new Date().toISOString()
            };
            const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = 'ai-engineer-roadmap-'+new Date().toISOString().split('T')[0]+'.json';
            a.click(); URL.revokeObjectURL(a.href); showToast('📥 Progress exported!');
        }
        function importData(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.completedWeeks) { completedWeeks = new Set(data.completedWeeks); saveWeeks(); }
                    if (data.completedDays) { completedDays = new Set(data.completedDays); saveDays(); }
                    if (data.notes) { notes = data.notes; saveNotes(); }
                    if (data.startDate) localStorage.setItem('aiml_start_date', data.startDate);
                    if (data.theme) { localStorage.setItem('aiml_theme', data.theme); applyTheme(); }
                    renderAll(); showToast('📤 Progress imported!');
                } catch { showToast('⚠️ Invalid file'); }
            };
            reader.readAsText(file); event.target.value = '';
        }
        function resetAll() {
            if (confirm('⚠️ Delete ALL progress and notes?')) {
                if (confirm('🚨 Final warning: irreversible.')) {
                    completedWeeks.clear(); completedDays.clear(); notes={};
                    saveWeeks(); saveDays(); saveNotes(); localStorage.removeItem('aiml_start_date');
                    focusedWeekNum=null; document.getElementById('search-input').value=''; currentFilter='';
                    document.getElementById('search-clear').classList.remove('visible');
                    renderAll(); showToast('🔄 All progress reset');
                }
            }
        }

        renderAll();
        if (completedWeeks.size===0) {
            setTimeout(()=>{
                const pb1=document.getElementById('pb-p1');
                if(pb1&&!pb1.classList.contains('open')){ pb1.classList.add('open'); document.getElementById('pi-p1')?.classList.add('open'); }
            },200);
        }
    </script>
</body>
</html>
